<!DOCTYPE html>
<html lang="hi" class="dark">
<head>
  <meta name="google-site-verification" content="HigXoTddIICIqIAsvCnztZm-5wH6s38pxb8I_2HjkMk" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blitz Downloader | Reels Downloader </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/btch-downloader/dist/browser/index.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { transition: background-color 0.4s; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .dark body { background-color: #050a15; color: #ffffff; }
    .light body { background-color: #f0f4f8; color: #000000; }
    
    .glass { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .dark .glass { background: rgba(255, 255, 255, 0.02); }
    .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.05); }

    /* Glossy Support Button */
    .glossy-btn {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4), inset 0 2px 4px rgba(255,255,255,0.6);
      position: relative; overflow: hidden;
    }
    .glossy-btn::after {
      content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      transform: rotate(30deg); animation: shine 3s infinite;
    }
    @keyframes shine { 100% { left: 200%; } }

    /* Slider Animation */
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .logo-slider { display: flex; width: 200%; animation: scroll 20s linear infinite; }

    #processingOverlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 100; backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="min-h-screen">

  <div id="processingOverlay" class="flex flex-col items-center justify-center">
    <div id="platformLogo" class="text-8xl mb-8 animate-pulse text-cyan-500">
        <i class="fas fa-bolt"></i>
    </div>
    <h2 id="processText" class="text-3xl font-black tracking-tighter text-white uppercase italic">Blitzing...</h2>
    <div class="mt-4 w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
        <div class="h-full bg-cyan-500 animate-[loading_2s_ease-in-out_infinite]" style="width: 50%;"></div>
    </div>
  </div>

  <div class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
    <button onclick="shareApp()" class="p-3 rounded-xl glass hover:text-cyan-500 transition-all flex items-center gap-2 font-bold text-xs uppercase">
      <i class="fas fa-share-nodes"></i> Share
    </button>
    <button onclick="toggleTheme()" class="p-3 rounded-xl glass hover:scale-110 transition-all">
      <i id="themeIcon" class="fas fa-moon text-yellow-400"></i>
    </button>
  </div>

  <div class="max-w-4xl mx-auto px-6 pt-8 pb-12">
    <div class="text-center mb-12">
      <h1 class="text-7xl md:text-9xl font-black mb-4 tracking-[ -0.05em] leading-none bg-gradient-to-b from-white via-cyan-400 to-blue-600 bg-clip-text text-transparent italic">
        BLITZ
      </h1>
      <h2 class="text-4xl md:text-5xl font-black tracking-tighter uppercase opacity-90 dark:text-white light:text-black">
        DOWNLOADER
      </h2>
      <p class="mt-4 text-cyan-500 font-bold text-xs tracking-[0.5em] uppercase">Engineered by KaifSalmani</p>
    </div>

    <div class="relative overflow-hidden mb-12 py-4 border-y border-white/5">
        <div class="logo-slider gap-12 text-2xl items-center opacity-60">
            <span><i class="fab fa-instagram text-pink-500"></i> INSTAGRAM</span>
            <span><i class="fab fa-youtube text-red-600"></i> YOUTUBE</span>
            <span><i class="fab fa-facebook text-blue-600"></i> FACEBOOK</span>
            <span><i class="fab fa-tiktok text-white"></i> TIKTOK</span>
            <span><i class="fab fa-twitter text-sky-400"></i> TWITTER</span>
            <span><i class="fas fa-at text-purple-500"></i> THREADS</span>
            <span><i class="fab fa-instagram text-pink-500"></i> INSTAGRAM</span>
            <span><i class="fab fa-youtube text-red-600"></i> YOUTUBE</span>
            <span><i class="fab fa-facebook text-blue-600"></i> FACEBOOK</span>
            <span><i class="fab fa-tiktok text-white"></i> TIKTOK</span>
        </div>
    </div>

    <div class="glass p-3 rounded-[2.5rem] flex flex-col md:flex-row items-center shadow-2xl mb-8 transition-all focus-within:ring-4 ring-cyan-500/20">
      <div class="flex w-full items-center">
        <button onclick="pasteLink()" class="p-4 text-slate-500 hover:text-cyan-500">
            <i class="fas fa-paste text-2xl"></i>
        </button>
        <input id="urlInput" type="text" 
               class="w-full p-5 bg-transparent border-none focus:outline-none text-xl font-bold placeholder-slate-500"
               placeholder="Enter link here...">
      </div>
      <button onclick="startDownload()" 
              class="w-full md:w-auto bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-black px-12 py-6 rounded-[1.8rem] shadow-xl hover:scale-105 active:scale-95 transition-all text-sm tracking-widest uppercase">
        DOWNLOAD&nbsp;HD
      </button>
    </div>

    <div id="noticeBox" class="hidden transform transition-all duration-300 p-5 rounded-2xl border-2 text-center font-black uppercase tracking-tighter text-sm mb-8"></div>

    <div id="result" class="hidden glass p-8 rounded-[3rem] animate-in slide-in-from-bottom-10 duration-700">
        <div class="flex flex-col items-center">
            <img id="thumbnail" class="w-full max-w-sm rounded-[2rem] shadow-2xl mb-6 border-4 border-cyan-500/10" alt="">
            <h3 id="title" class="text-xl font-black mb-8 px-4 dark:text-white light:text-black"></h3>
            <div id="downloadLinks" class="w-full max-w-md"></div>
        </div>
    </div>

    <div class="mt-20 text-center">
        <a href="https://kaifsalmani-donation.blogspot.com/?m=1" target="_blank" 
           class="glossy-btn inline-flex items-center gap-3 px-10 py-4 text-black font-black rounded-2xl transition-all hover:scale-110 text-xs uppercase tracking-widest">
            <i class="fas fa-bolt"></i> Support/Donation
        </a>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const body = document.documentElement;
      const icon = document.getElementById('themeIcon');
      body.classList.toggle('light'); body.classList.toggle('dark');
      icon.className = body.classList.contains('light') ? 'fas fa-sun text-orange-500' : 'fas fa-moon text-yellow-400';
    }

    function shareApp() {
        if (navigator.share) {
            navigator.share({ title: 'Blitz Downloader', text: 'Check this All-in-One HD Downloader by KaifSalmani!', url: window.location.href });
        } else { showNotice('Sharing not supported on this browser', 'error'); }
    }

    async function pasteLink() {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text;
      showNotice('Link Pasted!', 'success');
    }

    function showNotice(msg, type) {
      const box = document.getElementById('noticeBox');
      box.textContent = msg;
      box.className = `p-5 rounded-2xl border-2 text-center font-black uppercase tracking-tighter text-sm mb-8 block ${
        type === 'error' ? 'bg-red-500/10 border-red-500/30 text-red-500' : 'bg-green-500/10 border-green-500/30 text-green-500'
      }`;
      setTimeout(() => box.classList.add('hidden'), 4000);
    }

    async function startDownload() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return showNotice('Bhai Link toh dalo! ⚠️', 'error');

      const logo = document.getElementById('platformLogo');
      const procText = document.getElementById('processText');
      
      // Dynamic Branding Logic
      if(url.includes('instagram.com')) {
          logo.innerHTML = '<i class="fab fa-instagram text-pink-500"></i>';
          procText.textContent = 'Blitzing Instagram...';
      } else if(url.includes('facebook.com') || url.includes('fb.watch')) {
          logo.innerHTML = '<i class="fab fa-facebook text-blue-600"></i>';
          procText.textContent = 'Blitzing Facebook...';
      } else if(url.includes('youtube.com') || url.includes('youtu.be')) {
          logo.innerHTML = '<i class="fab fa-youtube text-red-600"></i>';
          procText.textContent = 'Blitzing YouTube...';
      } else {
          logo.innerHTML = '<i class="fas fa-bolt text-cyan-500"></i>';
          procText.textContent = 'Blitzing Media...';
      }

      document.getElementById('processingOverlay').style.display = 'flex';

      try {
        const data = await window.btch.aio(url);
        document.getElementById('processingOverlay').style.display = 'none';
        
        const info = data.data || data;
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('thumbnail').src = info.thumbnail || '';
        document.getElementById('title').textContent = info.title || 'Download Ready';

        const container = document.getElementById('downloadLinks');
        container.innerHTML = '';

        let links = [];
        if(info.links?.video) {
            const qualities = Object.keys(info.links.video);
            const best = qualities.includes('1080p') ? '1080p' : (qualities.includes('720p') ? '720p' : qualities[0]);
            links.push({ label: `Download HD (${best})`, url: info.links.video[best].url });
        } else if(info.url || info.download) {
            links.push({ label: 'Download HD Video', url: info.url || info.download });
        }

        links.forEach(l => {
          const a = document.createElement('a');
          a.href = l.url; a.target = "_blank";
          a.className = "block w-full p-6 bg-cyan-500 text-white rounded-2xl font-black uppercase tracking-widest text-sm text-center hover:bg-cyan-600 shadow-xl";
          a.textContent = l.label;
          container.appendChild(a);
        });

      } catch (err) {
        document.getElementById('processingOverlay').style.display = 'none';
        showNotice('Invalid Link or Media not found!', 'error');
      }
    }
  </script>
</body>
</html>
